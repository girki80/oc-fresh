services:
  - type: web
    name: origincheck
    env: node
    buildCommand: "npm install && cd client && npm install && npm run build"
    startCommand: "node server.js"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NODE_ENV
        value: production
